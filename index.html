<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F7F8" />
  <title>Love Budget｜愛情條件分配</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="home">
  <main class="app-shell home-shell">
    <header class="ios-nav">
      <a href="index.html" class="brand">Love Budget</a>
      <button id="resetBtn" class="nav-button" type="button">重置</button>
    </header>

    <section class="hero-panel">
      <div class="hero-badge">500 Budget Test</div>

      <h1>用 500 元，<br />看見你的愛情排序。</h1>

      <p class="hero-copy">
        先選出你在意的伴侶條件，再把 500 元預算分配給它們。
        結果會以分數呈現，不替你貼標籤。
      </p>

      <div class="hero-preview">
        <div>
          <span>01</span>
          <strong>選條件</strong>
          <p>從不同面向挑出你重視的項目。</p>
        </div>

        <div>
          <span>02</span>
          <strong>分預算</strong>
          <p>把 500 元分配到你選擇的條件。</p>
        </div>

        <div>
          <span>03</span>
          <strong>看結果</strong>
          <p>產生分數摘要與可分享圖。</p>
        </div>
      </div>

      <a class="primary-action" href="choose.html">開始測驗</a>
    </section>

    <section class="plain-note">
      <p>
        本測驗適合課堂活動、社群互動與自我探索使用。結果只呈現你的選擇分布，不代表心理診斷。
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
